<div class="card" (click)="openKaspi()">
    <div class="upper">
        <img [src]="product.image">
        <h3>{{ product.name }}</h3>
    </div>
    <div class="lower">
        <span>{{ product.price }} ₸</span>
        <span>⭐ {{ product.rating }}</span>
        <div><p>{{ product.description }}</p></div>
        
        <button (click) = "shareWhatsApp($event)">Share</button>
    </div>
</div>
